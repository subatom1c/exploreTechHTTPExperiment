<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>e29 messages</title>
        <link rel="stylesheet" href="styles.css">
        <script src="/frontend.js" defer></script>
    </head>
    <body data-page="auth">
    <main class="page">
        <h1>Choose a username</h1>
        <p class="subtitle">Start a lightweight chat session in one click.</p>

        <div id="flash-area" class="flash-list" role="status" aria-live="polite" hidden></div>

        <form action="/authentication" method="post">
            <input type="text" name="username" placeholder="Enter your username" maxlength="32" required>
            <button type="submit">Authenticate</button>
        </form>
    </main>
    </body>
</html>
