<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>e29 messages</title>
        <link rel="stylesheet" href="styles.css">
        <script src="/frontend.js" defer></script>
    </head>
    <body data-page="messaging">
    <main class="page">
        <header class="chat-header">
            <div>
                <h1>Let&apos;s message our friends</h1>
                <p class="subtitle">Signed in as <strong id="active-username"></strong></p>
            </div>
        </header>

        <div id="flash-area" class="flash-list" role="status" aria-live="polite" hidden></div>

        <div class="top-panels">
            <section class="users-panel" id="users-section" aria-label="Users">
                <h3>Send a message to:</h3>
                <ul id="users-list" class="users-list"></ul>
                <p id="users-empty" class="empty-state" hidden>No other users available.</p>
            </section>

            <aside class="vote-leaderboard-panel" id="vote-leaderboard-section" aria-label="Vote leaderboard">
                <h3>Vote Leaderboard (Vote Here)</h3>
                <ol id="vote-leaderboard-list" class="leaderboard-list"></ol>
                <p id="vote-leaderboard-empty" class="empty-state" hidden>No votes yet.</p>
            </aside>
        </div>

        <form action="/message" method="post" class="compose-form" id="compose-form">
            <input type="text" name="recipient" placeholder="Send to username" maxlength="32" required>
            <input type="text" name="message" placeholder="Write a message" maxlength="240" required>
            <button type="submit">Send Message</button>
        </form>

        <section class="messages-panel" id="messages-section" aria-label="Recent messages">
            <ul id="messages-list" class="messages-list"></ul>
            <p id="empty-state" class="empty-state">No messages in your inbox yet.</p>
        </section>

        <form action="/logout" method="post" class="logout-form-inline">
            <button type="submit" class="secondary">Log out</button>
        </form>
    </main>
    </body>
</html>
